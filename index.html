<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Real Estate Platform</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    nav a:hover {
      color: #38bdf8;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      background: linear-gradient(135deg, #0f172a, #1e293b);
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .hero p {
      color: #cbd5f5;
      margin-bottom: 25px;
    }

    .btn {
      padding: 12px 20px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #38bdf8;
      font-weight: bold;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    section {
      padding: 80px 40px;
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      margin-bottom: 20px;
    }

    /* GALLERY */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card p {
      padding: 10px;
    }

    /* MODAL */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal iframe {
      width: 80%;
      height: 60%;
    }

    /* CONTACT */
    .contact-box {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      max-width: 600px;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 12px;
      font-size: 14px;
      color: #cbd5f5;
    }

    input, textarea {
      padding: 12px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #0ea5e9;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav>
  <div><strong>AI Real Estate</strong></div>
  <div>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>AI Real Estate Experience</h1>
  <p>Turn property photos into cinematic AI videos</p>

  <button class="btn" onclick="document.getElementById('gallery').scrollIntoView({behavior:'smooth'})">
    View Gallery
  </button>
</section>

<!-- GALLERY -->
<section id="gallery">
  <h2>AI Video Gallery</h2>

  <div class="gallery">

    <div class="card" onclick="openVideo('https://www.youtube.com/embed/ScMzIvxBSi4')">
      <img src="https://source.unsplash.com/600x400/?house,luxury">
      <p>Luxury Home</p>
    </div>

    <div class="card" onclick="openVideo('https://www.youtube.com/embed/tgbNymZ7vqY')">
      <img src="https://source.unsplash.com/600x400/?apartment,modern">
      <p>Modern Apartment</p>
    </div>

    <div class="card" onclick="openVideo('https://www.youtube.com/embed/dQw4w9WgXcQ')">
      <img src="https://source.unsplash.com/600x400/?villa,house">
      <p>Villa Showcase</p>
    </div>

  </div>
</section>

<!-- MODAL -->
<div id="videoModal" class="modal" onclick="closeVideo()">
  <iframe id="videoFrame" frameborder="0" allowfullscreen></iframe>
</div>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact Us</h2>

  <div class="contact-box">

    <form action="https://formspree.io/f/xjglvlkv" method="POST">

      <label>
        Name
        <input type="text" name="name" required>
      </label>

      <label>
        Email
        <input type="email" name="email" required>
      </label>

      <label>
        Message
        <textarea name="message" rows="5" required></textarea>
      </label>

      <button type="submit">Send Message</button>

    </form>

  </div>
</section>

<!-- FOOTER -->
<footer>
  © 2026 AI Real Estate Platform
</footer>

<!-- SCRIPT -->
<script>
function openVideo(url) {
  document.getElementById("videoFrame").src = url;
  document.getElementById("videoModal").style.display = "flex";
}

function closeVideo() {
  document.getElementById("videoModal").style.display = "none";
  document.getElementById("videoFrame").src = "";
}
</script>

</body>
</html>
