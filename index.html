<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Real Estate Showcase</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    background: #0f172a;
    color: white;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 18px 30px;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(10px);
    z-index: 1000;
  }

  nav a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
    font-size: 14px;
  }

  nav a:hover {
    color: #38bdf8;
  }

  /* HERO */
  .hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    background: linear-gradient(135deg, #0f172a, #1e293b);
  }

  .hero h1 {
    font-size: 3rem;
    margin-bottom: 10px;
  }

  .hero p {
    color: #cbd5f5;
  }

  section {
    padding: 80px 20px;
    max-width: 1100px;
    margin: auto;
  }

  h2 {
    margin-bottom: 30px;
  }

  /* LISTINGS */
  .listing {
    display: flex;
    gap: 20px;
    margin-bottom: 40px;
    align-items: stretch;
  }

  .photo, .video {
    flex: 1;
    background: #1e293b;
    border-radius: 12px;
    overflow: hidden;
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .video iframe {
    width: 100%;
    height: 100%;
    min-height: 320px;
    border: none;
  }

  /* CONTACT */
  .contact-box {
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
    max-width: 600px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;
  }

  label {
    margin-bottom: 6px;
    color: #cbd5f5;
    font-size: 14px;
  }

  input, textarea {
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 14px;
  }

  button {
    width: 100%;
    padding: 12px;
    background: #38bdf8;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #0ea5e9;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 30px;
    color: #94a3b8;
  }

  /* 📱 MOBILE FIX */
  @media (max-width: 768px) {

    .listing {
      flex-direction: column;
    }

    .hero h1 {
      font-size: 2rem;
    }

    nav {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
  }
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div><strong>AI Real Estate</strong></div>
  <div>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>AI Real Estate Showcase</h1>
  <p>Turn property photos into cinematic video experiences</p>
</section>

<!-- LISTINGS -->
<section>

  <h2>Featured Properties</h2>

  <!-- LISTING 1 -->
  <div class="listing">
    <div class="photo">
      <img src="https://source.unsplash.com/800x600/?luxury,house">
    </div>
    <div class="video">
      <iframe src="https://www.youtube.com/embed/ScMzIvxBSi4" allowfullscreen></iframe>
    </div>
  </div>

  <!-- LISTING 2 -->
  <div class="listing">
    <div class="photo">
      <img src="https://source.unsplash.com/800x600/?modern,apartment">
    </div>
    <div class="video">
      <iframe src="https://www.youtube.com/embed/tgbNymZ7vqY" allowfullscreen></iframe>
    </div>
  </div>

  <!-- LISTING 3 -->
  <div class="listing">
    <div class="photo">
      <img src="https://source.unsplash.com/800x600/?villa,estate">
    </div>
    <div class="video">
      <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
    </div>
  </div>

</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact Us</h2>

  <div class="contact-box">

    <form action="https://formspree.io/f/xjglvlkv" method="POST">

      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea name="message" rows="5" required></textarea>
      </div>

      <button type="submit">Send Message</button>

    </form>

  </div>
</section>

<!-- FOOTER -->
<footer>
  © 2026 AI Real Estate Showcase
</footer>

</body>
</html>
